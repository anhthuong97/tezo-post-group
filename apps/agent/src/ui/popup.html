<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>TeZo Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; background: #f8f9fa; color: #1a1a1a; }

    .header { background: #1877f2; color: white; padding: 14px 16px; display: flex; align-items: flex-start; justify-content: space-between; }
    .header-text h1 { font-size: 16px; font-weight: 700; }
    .header-text p  { font-size: 11px; opacity: .8; margin-top: 2px; }
    .btn-minimize {
      background: rgba(255,255,255,0.2); border: none; color: white;
      width: 26px; height: 26px; border-radius: 6px; cursor: pointer;
      font-size: 16px; line-height: 1; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .btn-minimize:hover { background: rgba(255,255,255,0.35); }

    .status-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px; font-size: 12px; font-weight: 500;
      border-bottom: 1px solid #e5e7eb;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #d1d5db; }
    .dot.green  { background: #22c55e; }
    .dot.red    { background: #ef4444; }
    .dot.yellow { background: #f59e0b; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }

    label { display: block; font-weight: 500; margin-bottom: 4px; color: #444; font-size: 12px; }
    input, select {
      width: 100%; padding: 7px 10px;
      border: 1px solid #d0d5dd; border-radius: 6px;
      font-size: 13px; outline: none;
    }
    input:focus { border-color: #1877f2; }

    .row { display: flex; gap: 8px; }
    .btn {
      flex: 1; padding: 8px; border: none; border-radius: 6px;
      font-size: 12px; font-weight: 600; cursor: pointer;
    }
    .btn-primary { background: #1877f2; color: white; }
    .btn-primary:hover { background: #1561d4; }
    .btn-primary:disabled { opacity: .5; cursor: default; }
    .btn-danger  { background: #fee2e2; color: #991b1b; }
    .btn-danger:hover { background: #fecaca; }
    .btn-gray    { background: #f3f4f6; color: #374151; }
    .btn-gray:hover { background: #e5e7eb; }

    .divider { height: 1px; background: #e5e7eb; }

    .log-box {
      background: #111; color: #86efac; font-family: monospace;
      font-size: 11px; padding: 8px; border-radius: 6px;
      height: 100px; overflow-y: auto; white-space: pre-wrap;
    }

    .task-info {
      background: #dbeafe; color: #1e40af;
      padding: 8px 10px; border-radius: 6px; font-size: 12px;
      display: none;
    }
    .task-info.show { display: block; }

    .error-msg { color: #dc2626; font-size: 12px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-text">
      <h1>TeZo Agent</h1>
      <p>Tự động đăng bài Facebook</p>
    </div>
    <button class="btn-minimize" id="btnMinimize" title="Thu nhỏ xuống khay">—</button>
  </div>

  <div class="status-bar">
    <div class="dot" id="dot"></div>
    <span id="statusText">Chưa kết nối</span>
  </div>

  <div class="body">
    <!-- Settings -->
    <div>
      <label>URL Server</label>
      <input id="serverUrl" placeholder="http://157.10.201.146" />
    </div>
    <div>
      <label>Tên đăng nhập</label>
      <input id="username" placeholder="admin" autocomplete="username" />
    </div>
    <div>
      <label>Mật khẩu</label>
      <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <p class="error-msg" id="errorMsg"></p>

    <div class="row">
      <button class="btn btn-primary" id="btnConnect">Kết nối</button>
      <button class="btn btn-gray"    id="btnDisconnect" style="display:none">Ngắt kết nối</button>
      <button class="btn btn-danger"  id="btnClearSession">Xóa session FB</button>
    </div>

    <div class="divider"></div>

    <!-- Task đang chạy -->
    <div class="task-info" id="taskInfo"></div>

    <!-- Log -->
    <div>
      <label>Log</label>
      <div class="log-box" id="logBox">Chờ kết nối...</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
