<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>TeZo Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; background: #f8f9fa; color: #1a1a1a; }

    .header { background: #1877f2; color: white; padding: 14px 16px; display: flex; align-items: flex-start; justify-content: space-between; }
    .header-text h1 { font-size: 16px; font-weight: 700; }
    .header-text p  { font-size: 11px; opacity: .8; margin-top: 2px; }
    .btn-minimize {
      background: rgba(255,255,255,0.2); border: none; color: white;
      width: 26px; height: 26px; border-radius: 6px; cursor: pointer;
      font-size: 16px; line-height: 1; display: flex; align-items: center; justify-content: center;
    }
    .btn-minimize:hover { background: rgba(255,255,255,0.35); }

    .status-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px; font-size: 12px; font-weight: 500;
      border-bottom: 1px solid #e5e7eb;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #d1d5db; flex-shrink: 0; }
    .dot.green  { background: #22c55e; }
    .dot.red    { background: #ef4444; }
    .dot.yellow { background: #f59e0b; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }

    label { display: block; font-weight: 500; margin-bottom: 4px; color: #444; font-size: 12px; }
    input {
      width: 100%; padding: 7px 10px;
      border: 1px solid #d0d5dd; border-radius: 6px;
      font-size: 13px; outline: none; background: white;
    }
    input:focus { border-color: #1877f2; }
    input[readonly] {
      background: #f3f4f6; color: #6b7280; cursor: default;
      border-color: #e5e7eb;
    }

    .btn {
      padding: 9px; border: none; border-radius: 6px;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .btn-full { width: 100%; }
    .btn-primary { background: #1877f2; color: white; }
    .btn-primary:hover { background: #1561d4; }
    .btn-primary:disabled { opacity: .5; cursor: default; }
    .btn-danger  { background: #fee2e2; color: #dc2626; }
    .btn-danger:hover  { background: #fecaca; }
    .btn-success { background: #dcfce7; color: #16a34a; }
    .btn-success:hover { background: #bbf7d0; }

    .error-msg { color: #dc2626; font-size: 12px; min-height: 16px; }

    .task-bar {
      background: #dbeafe; color: #1e40af;
      padding: 8px 10px; border-radius: 6px; font-size: 12px;
      display: none;
    }
    .task-bar.show { display: block; }

    /* Browser status row */
    .browser-row {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; border-radius: 6px;
      background: #f3f4f6; border: 1px solid #e5e7eb;
    }
    .browser-label { flex: 1; font-size: 12px; font-weight: 500; color: #374151; }
    .browser-label span { font-size: 11px; font-weight: 400; color: #6b7280; margin-left: 4px; }
    .btn-sm {
      padding: 5px 10px; font-size: 11px; font-weight: 600;
      border: none; border-radius: 5px; cursor: pointer;
    }
    .btn-sm-open   { background: #dbeafe; color: #1d4ed8; }
    .btn-sm-open:hover  { background: #bfdbfe; }
    .btn-sm-close  { background: #fee2e2; color: #dc2626; }
    .btn-sm-close:hover { background: #fecaca; }

    /* Sections */
    #sectionLogin     { display: flex; flex-direction: column; gap: 10px; }
    #sectionConnected { display: none; flex-direction: column; gap: 10px; }
    body.connected #sectionLogin     { display: none; }
    body.connected #sectionConnected { display: flex; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-text">
      <h1>TeZo Agent</h1>
      <p>Tự động đăng bài Facebook</p>
    </div>
    <button class="btn-minimize" id="btnMinimize" title="Thu nhỏ xuống khay">—</button>
  </div>

  <div class="status-bar">
    <div class="dot" id="dot"></div>
    <span id="statusText">Chưa kết nối</span>
  </div>

  <div class="body">

    <!-- Chưa kết nối -->
    <div id="sectionLogin">
      <div>
        <label>URL Server</label>
        <input id="serverUrl" autocomplete="off" />
      </div>
      <div>
        <label>Tên đăng nhập</label>
        <input id="username" autocomplete="username" />
      </div>
      <div>
        <label>Mật khẩu</label>
        <input id="password" type="password" autocomplete="current-password" />
      </div>
      <p class="error-msg" id="errorMsg"></p>
      <button class="btn btn-full btn-primary" id="btnConnect">Kết nối</button>
    </div>

    <!-- Đã kết nối -->
    <div id="sectionConnected">
      <div>
        <label>URL Server</label>
        <input id="serverUrlRO" readonly />
      </div>
      <div>
        <label>Tên đăng nhập</label>
        <input id="usernameRO" readonly />
      </div>

      <!-- Browser Chrome status -->
      <div class="browser-row">
        <div class="dot" id="browserDot"></div>
        <div class="browser-label">
          Browser<span id="browserStatus">Chưa mở</span>
        </div>
        <button class="btn-sm btn-sm-open"  id="btnOpenBrowser">Mở</button>
        <button class="btn-sm btn-sm-close" id="btnCloseBrowser">Đóng</button>
      </div>

      <div class="task-bar" id="taskBar"></div>
      <button class="btn btn-full btn-danger" id="btnDisconnect">Ngắt kết nối</button>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
