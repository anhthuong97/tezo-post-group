<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TeZo Session</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #f8f9fa;
      color: #1a1a1a;
    }

    .header {
      background: #1877f2;
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
    .header .sub { font-size: 11px; opacity: 0.85; }

    .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }

    label { display: block; font-weight: 500; margin-bottom: 4px; color: #444; }

    input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #d0d5dd;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: #1877f2; }

    .btn {
      width: 100%;
      padding: 9px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, opacity .15s;
    }
    .btn-primary { background: #1877f2; color: white; }
    .btn-primary:hover { background: #1561d4; }
    .btn-primary:disabled { opacity: .55; cursor: default; }

    .status {
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
      display: none;
    }
    .status.success { background: #d1fae5; color: #065f46; display: block; }
    .status.error   { background: #fee2e2; color: #991b1b; display: block; }
    .status.loading { background: #dbeafe; color: #1e40af; display: block; }

    .warning {
      background: #fef9c3;
      color: #854d0e;
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 11.5px;
      line-height: 1.5;
      display: none;
    }
    .warning.show { display: block; }

    .divider { height: 1px; background: #e5e7eb; }

    .saved-info {
      font-size: 11px;
      color: #6b7280;
      text-align: right;
      margin-top: -4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <div class="logo">TeZo</div>
      <div class="sub">Facebook Session Manager</div>
    </div>
  </div>

  <div class="body">
    <div class="warning" id="warningNotFb">
      Bạn chưa đang ở trang Facebook. Hãy mở <strong>facebook.com</strong>, đăng nhập xong rồi click lại.
    </div>

    <div>
      <label>URL Server</label>
      <input id="serverUrl" type="text" placeholder="http://157.10.201.146" />
    </div>

    <div>
      <label>Tên đăng nhập (TeZo)</label>
      <input id="username" type="text" placeholder="admin" autocomplete="username" />
    </div>

    <div>
      <label>Mật khẩu (TeZo)</label>
      <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
      <div class="saved-info" id="savedInfo"></div>
    </div>

    <div class="divider"></div>

    <button class="btn btn-primary" id="btnSend">Gửi session Facebook lên server</button>

    <div class="status" id="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
