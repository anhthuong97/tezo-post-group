<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập — FB Auto Poster</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.12);
      padding: 40px 36px 32px;
      width: 360px;
    }
    .login-logo {
      font-size: 22px;
      font-weight: 700;
      color: #1877f2;
      text-align: center;
      margin-bottom: 6px;
    }
    .login-sub {
      font-size: 13px;
      color: #65676b;
      text-align: center;
      margin-bottom: 28px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #1c1e21;
      margin-bottom: 6px;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #dadde1;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 16px;
    }
    input:focus { border-color: #1877f2; }
    .login-btn {
      width: 100%;
      padding: 11px;
      background: #1877f2;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }
    .login-btn:hover { background: #166fe5; }
    .login-btn:disabled { background: #a8c7fa; cursor: not-allowed; }
    .error-msg {
      margin-top: 14px;
      padding: 10px 12px;
      background: #fff5f5;
      border: 1px solid #ffa8a8;
      border-radius: 8px;
      color: #c92a2a;
      font-size: 13px;
      display: none;
    }
    .error-msg.visible { display: block; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">FB Auto Poster</div>
    <div class="login-sub">Đăng nhập để sử dụng</div>
    <form id="loginForm">
      <label for="username">Tên đăng nhập</label>
      <input type="text" id="username" autocomplete="username" autocapitalize="none" required />
      <label for="password">Mật khẩu</label>
      <input type="password" id="password" autocomplete="current-password" required />
      <button type="submit" class="login-btn" id="loginBtn">Đăng nhập</button>
    </form>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errorEl = document.getElementById('errorMsg');
      errorEl.classList.remove('visible');
      btn.disabled = true;
      btn.textContent = 'Đang đăng nhập...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = '/';
        } else {
          errorEl.textContent = data.error || 'Đăng nhập thất bại.';
          errorEl.classList.add('visible');
        }
      } catch {
        errorEl.textContent = 'Lỗi kết nối máy chủ.';
        errorEl.classList.add('visible');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Đăng nhập';
      }
    });
  </script>
</body>
</html>
